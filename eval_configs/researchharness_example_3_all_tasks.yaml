# Batch evaluation config for all official ResearchClawBench tasks.
# Run with AGENT_API_BASE/AGENT_API_KEY and JUDGE_API_BASE/JUDGE_API_KEY set.

name: researchharness_example_all_tasks

agent_model:
  name: gpt-5.4
  api_base_env: AGENT_API_BASE
  api_key_env: AGENT_API_KEY

tasks: all
repeats_per_task: 1
max_concurrent_runs: 4

researchharness:
  max_llm_calls: 100
  max_rounds: 100
  max_runtime_seconds: 9000
  max_output_tokens: 10000

judge_model:
  enabled: true
  name: gpt-5.1
  api_base_env: JUDGE_API_BASE
  api_key_env: JUDGE_API_KEY
