# Qwen example with provider-specific thinking control.
# Set enable_thinking to true for Qwen thinking mode. Keep max_output_tokens high
# when thinking is enabled, otherwise the model may spend the budget on thinking
# tokens and return no final content.

name: researchharness_example_qwen_thinking

agent_model:
  name: Qwen/Qwen3.5-9B
  api_base_env: AGENT_API_BASE
  api_key_env: AGENT_API_KEY
  extra_body:
    enable_thinking: false

tasks:
  - id: Physics_003
    repeats: 1

repeats_per_task: 1
max_concurrent_runs: 1

researchharness:
  max_rounds: 500
  max_runtime_seconds: 10800
  max_output_tokens: 40960

judge_model:
  enabled: true
  name_env: JUDGE_MODEL_NAME
  api_base_env: JUDGE_API_BASE
  api_key_env: JUDGE_API_KEY
