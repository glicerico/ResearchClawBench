# Minimal batch evaluation config for the ResearchHarness-backed CLI.
# Run with AGENT_MODEL_NAME/AGENT_API_BASE/AGENT_API_KEY and
# JUDGE_MODEL_NAME/JUDGE_API_BASE/JUDGE_API_KEY set, for example:
#   python3 -m evaluation.cli_eval eval_configs/researchharness_example_1_single_task.yaml

name: researchharness_example

agent_model:
  name_env: AGENT_MODEL_NAME
  api_base_env: AGENT_API_BASE
  api_key_env: AGENT_API_KEY

tasks:
  - id: Physics_003
    repeats: 1

repeats_per_task: 1
max_concurrent_runs: 1

researchharness:
  max_rounds: 500
  max_runtime_seconds: 10800
  max_output_tokens: 40960

judge_model:
  enabled: true
  name_env: JUDGE_MODEL_NAME
  api_base_env: JUDGE_API_BASE
  api_key_env: JUDGE_API_KEY
